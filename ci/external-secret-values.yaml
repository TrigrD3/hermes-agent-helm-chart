fullnameOverride: hermes-external-secret

apiServer:
  enabled: true
  host: 0.0.0.0
  port: 8642
  corsOrigins: https://apps.example.test
  modelName: hermes-agent-prod

secrets:
  existingSecret: hermes-agent-external-secret

service:
  enabled: true

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
  hosts:
    - host: hermes.example.test
      paths:
        - path: /
          pathType: Prefix

virtualService:
  enabled: true
  gateways:
    - istio-system/public-gateway
  hosts:
    - hermes.example.test

externalSecret:
  enabled: true
  refreshInterval: 1h
  secretStoreRef:
    name: platform-secrets
    kind: ClusterSecretStore
  target:
    name: hermes-agent-external-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      metadata:
        annotations:
          reloader.stakater.com/match: "true"
  data:
    - secretKey: OPENROUTER_API_KEY
      remoteRef:
        key: hermes-agent/prod
        property: OPENROUTER_API_KEY
    - secretKey: API_SERVER_KEY
      remoteRef:
        key: hermes-agent/prod
        property: API_SERVER_KEY
